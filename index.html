<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-right">
            <div class="user-menu">
                <button class="user-avatar" aria-label="User menu">S</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="logo-section">
            <div class="logo-text">Launcher</div>
        </div>

        <div class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <div class="search-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <input type="text" class="search-input" id="searchInput"
                           placeholder="Search the web or type a URL"
                           autocomplete="off" autofocus>
                </div>
            </div>
        </div>

        <div class="shortcuts-section">
            <div class="shortcuts-container">
                <div class="shortcuts-grid" id="shortcutsGrid"></div>
            </div>
        </div>

        <div class="add-shortcut-section">
            <button class="add-shortcut-btn" id="addShortcutBtn">
                <i class="fas fa-plus"></i>
                <span>Add shortcut</span>
            </button>
        </div>
    </main>

    <!-- MODAL: ADD SHORTCUT -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Shortcut</h2>
                <button class="close-modal" id="closeModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="shortcutName">Name</label>
                    <input type="text" id="shortcutName" class="form-input" placeholder="Example: Gmail" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="shortcutUrl">URL</label>
                    <input type="url" id="shortcutUrl" class="form-input" placeholder="https://mail.google.com" autocomplete="off">
                </div>
                <p class="favicon-note">Site icon will be loaded automatically from Google Favicon service.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" id="saveBtn">Add Shortcut</button>
            </div>
        </div>
    </div>

    <!-- MODAL: EDIT SHORTCUT -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Shortcut</h2>
                <button class="close-modal" id="closeEditModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editShortcutName">Name</label>
                    <input type="text" id="editShortcutName" class="form-input" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="editShortcutUrl">URL</label>
                    <input type="url" id="editShortcutUrl" class="form-input" autocomplete="off">
                </div>
                <input type="hidden" id="editShortcutId">
                <p class="favicon-note">Site icon will be loaded automatically from Google Favicon service.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteBtn">Delete</button>
                <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS PANEL -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>Settings</h3>
            <button class="close-settings" id="closeSettings" aria-label="Close settings">&times;</button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="autoFocus" checked> Auto-focus search bar
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="showUrl" checked> Show URL on hover
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="compactView"> Compact view
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="oncePerSession"> Only show Launcher on first new tab per session (30 min)
                </label>
            </div>
            
            <!-- ===== NEW: DARK MODE SETTINGS ===== -->
            <div class="setting-item">
                <span style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary);">Dark mode</span>
                <div style="display: flex; gap: 16px;">
                    <label style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="darkMode" id="darkModeSystem" value="system" checked> System
                    </label>
                    <label style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="darkMode" id="darkModeLight" value="light"> Light
                    </label>
                    <label style="display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="darkMode" id="darkModeDark" value="dark"> Dark
                    </label>
                </div>
            </div>
            <!-- ===================================== -->

            <div class="setting-item">
                <button class="btn btn-secondary" id="exportBtn">Export Shortcuts</button>
                <button class="btn btn-secondary" id="importBtn">Import Shortcuts</button>
            </div>
            <div class="setting-item">
                <button class="btn btn-danger" id="clearAllBtn">Clear All Shortcuts</button>
            </div>
        </div>
    </div>

    <button class="settings-btn" id="settingsBtn" title="Settings" aria-label="Open settings">
        <i class="fas fa-cog"></i>
    </button>

    <div class="disclaimer">
        Search powered by Google • Not affiliated with Google
    </div>

    <script src="script.js"></script>
</body>
</html>
